name: Promote SDK to production

# Runs on every push to staging `main`. If production `main` already matches,
# it no-ops. Otherwise it force-pushes staging `main` to `stainless/release` on
# the production repo and opens/updates a release PR against production `main`.
# Merging that PR triggers production's release-please + publish workflows.
#
# References only ever point downstream (config -> staging -> production); the
# production repo holds no token or workflow pointing back here. The repo-name
# guard below makes this workflow inert if it is ever propagated to production
# via a release (mirrors the generated release-doctor.yml guard).
on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

concurrency:
  group: stlc-promote
  cancel-in-progress: false

jobs:
  promote:
    # Only run in the staging repo. If this file lands in production via a
    # promoted release, this guard keeps it from running there.
    if: github.repository == 'nirvana-labs/terraform-provider-nirvana-staging'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PRODUCTION_REPO: nirvana-labs/terraform-provider-nirvana
    steps:
      - name: Mint Nirvana Release Bot token (scoped to production repo)
        # Push + open the release PR on production as the Nirvana Release Bot
        # GitHub App. The app has Contents/Pull-requests/Workflows write and is
        # installed org-wide, so a token scoped to the production repo can push
        # the release branch and open the PR. An App token does not expire the
        # way a PAT does — preferred for long-lived CI.
        uses: actions/create-github-app-token@df432ceedc7162793a195dd1713ff69aefc7379e # v2.0.6
        id: app_token
        with:
          app-id: ${{ vars.GH_NIRVANA_LABS_RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.GH_NIRVANA_LABS_RELEASE_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: terraform-provider-nirvana

      - name: Check out staging
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch production main
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          git remote add production \
            "https://x-access-token:${GH_TOKEN}@github.com/${PRODUCTION_REPO}.git"
          git fetch production main

      - name: Prepare production release branch
        id: release_branch
        run: |
          set -euo pipefail

          git checkout -B production-release origin/main

          restore_from_production_main() {
            path="$1"
            if git cat-file -e "production/main:${path}" 2> /dev/null; then
              git checkout production/main -- "$path"
            elif [ -e "$path" ]; then
              rm -rf "$path"
            fi
          }

          rm -f .github/workflows/stlc-promote.yml

          # Restore production-owned files from production main so staging-only CI
          # (e.g. the private-go-staging auth in ci.yml) and staging artifact slugs
          # never reach production. release-please.yml is intentionally NOT restored
          # — the generated one must land on production to wire the release flow.
          #
          # docs/ is preserved from production main too: stlc strips the Terraform
          # Registry docs to a docs/.keep on staging (they're not generated in CI),
          # so without this the release would blank the published provider's docs.
          # This keeps the existing docs; regenerating them at release (tfplugindocs)
          # is tracked separately (CORE-4507).
          rm -rf docs
          # NB: release-doctor.yml is intentionally NOT restored — stlc generates
          # it with the RELEASE_PLEASE_TOKEN check-env now that the target has
          # publish.release, and production's older copy is missing that line
          # (false "token not set" failures). Let the generated one through.
          for path in \
            .github/actions/setup-go/action.yml \
            .github/workflows/ci.yml \
            .github/workflows/publish-release.yml \
            .goreleaser.yml \
            docs \
            scripts/bootstrap \
            scripts/build \
            scripts/format \
            scripts/generate-docs \
            scripts/link \
            scripts/lint \
            scripts/test \
            scripts/unlink
          do
            restore_from_production_main "$path"
          done

          if ! git diff --quiet; then
            git config user.name "nirvana-release-bot[bot]"
            git config user.email "180491965+nirvana-release-bot[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore(release): sanitize production release branch"
          fi

          RELEASE_SHA=$(git rev-parse HEAD)
          PRODUCTION_SHA=$(git rev-parse production/main)
          if [ "$RELEASE_SHA" = "$PRODUCTION_SHA" ]; then
            echo "Production is already at $RELEASE_SHA. Nothing to release."
            echo "synced=true" >> "$GITHUB_OUTPUT"
          else
            echo "synced=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push staging main to the release branch on production
        if: steps.release_branch.outputs.synced == 'false'
        run: |
          git push production production-release:refs/heads/stainless/release --force

      - name: Open or update the release PR on production
        if: steps.release_branch.outputs.synced == 'false'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          set -euo pipefail

          release_pr_title="chore(release): update SDK"
          git log --oneline production/main..production-release > /tmp/release-pr-body.md

          EXISTING_PR=$(gh pr list \
            --repo "${PRODUCTION_REPO}" \
            --head stainless/release \
            --state open \
            --json number \
            --jq '.[0].number')
          if [ -z "${EXISTING_PR}" ]; then
            gh pr create \
              --repo "${PRODUCTION_REPO}" \
              --base main \
              --head stainless/release \
              --title "$release_pr_title" \
              --body-file /tmp/release-pr-body.md
          else
            echo "Release PR #${EXISTING_PR} already exists. Force-push has updated it."
            gh pr edit "$EXISTING_PR" \
              --repo "${PRODUCTION_REPO}" \
              --title "$release_pr_title" \
              --body-file /tmp/release-pr-body.md
          fi
